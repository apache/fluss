suite: tablet statefulset
templates:
  - templates/sts-tablet.yaml

tests:
  - it: should set default replicas to 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: should allow overriding replicas
    set:
      tablet.replicas: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 5

  - it: should set default liveness probe values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 100
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 1
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 3
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.tcpSocket.port
          value: 9124

  - it: should set default readiness probe values
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 100
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 1
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 10
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 3
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.port
          value: 9124

  - it: should allow overriding liveness probe values
    set:
      tablet.livenessProbe.failureThreshold: 50
      tablet.livenessProbe.timeoutSeconds: 5
      tablet.livenessProbe.initialDelaySeconds: 30
      tablet.livenessProbe.periodSeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 50
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 10

  - it: should allow overriding readiness probe values
    set:
      tablet.readinessProbe.failureThreshold: 50
      tablet.readinessProbe.timeoutSeconds: 5
      tablet.readinessProbe.initialDelaySeconds: 30
      tablet.readinessProbe.periodSeconds: 10
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 50
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 5
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 30
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 10

  - it: should have empty resources by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value: {}

  - it: should allow setting resource requests and limits
    set:
      tablet.resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "1"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 2Gi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "2"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 4Gi

  - it: should use emptyDir volume when storage is disabled
    set:
      tablet.storage.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}
      - isNull:
          path: spec.volumeClaimTemplates

  - it: should create volumeClaimTemplate when storage is enabled
    set:
      tablet.storage.enabled: true
      tablet.storage.size: 20Gi
      tablet.storage.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 20Gi
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: fast-ssd
