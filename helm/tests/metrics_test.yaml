suite: metrics-disabled-configmap
templates:
  - templates/configmap.yaml
tests:
  - it: does not add metrics reporter settings when reporters are empty
    asserts:
      - notMatchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:'
      - notMatchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:'
---

suite: metrics-enabled-configmap
templates:
  - templates/configmap.yaml
tests:
  - it: adds default prometheus reporter settings when prometheus is selected
    set:
      metrics.reporters: prometheus
      metrics.prometheus: {}
    asserts:
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:\s*prometheus'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:\s*9249'
  - it: renders selected reporter options from values
    set:
      metrics.reporters: prometheus
      metrics.prometheus:
        port: 9249
    asserts:
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:\s*prometheus'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:\s*9249'
---

suite: metrics-enabled-configmap-custom-reporters
templates:
  - templates/configmap.yaml
tests:
  - it: renders multiple selected reporter options from structured metrics values
    set:
      metrics.reporters: grph,prometheus
      metrics.grph:
        port: 9020
        host: example-localhost
        protocol: TCP
        interval: "60 SECONDS"
      metrics.prometheus:
        port: 9249
    asserts:
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:\s*grph,prometheus'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.grph\.port:\s*9020'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.grph\.host:\s*example-localhost'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.grph\.protocol:\s*TCP'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.grph\.interval:\s*60 SECONDS'
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:\s*9249'
---

suite: metrics-invalid-selector
templates:
  - templates/configmap.yaml
tests:
  - it: fails when selected reporter block is missing
    set:
      metrics.reporters: prometheus
      metrics.prometheus: null
    asserts:
      - failedTemplate:
          errorMessage: metrics.prometheus must be configured when metrics.reporters includes prometheus
---

suite: metrics-config-overrides-precedence
templates:
  - templates/configmap.yaml
tests:
  - it: prefers configurationOverrides for reporter keys when both are set
    set:
      metrics.reporters: prometheus
      metrics.prometheus:
        port: 9249
      configurationOverrides:
        metrics.reporter.prometheus.port: 9300
    asserts:
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:\s*9300'
      - notMatchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporter\.prometheus\.port:\s*9249'
  - it: prefers configurationOverrides for metrics.reporters when both are set
    set:
      metrics.reporters: grph,prometheus
      metrics.grph:
        port: 9020
      metrics.prometheus:
        port: 9249
      configurationOverrides:
        metrics.reporters: grph
    asserts:
      - matchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:\s*grph'
      - notMatchRegex:
          path: data["server.yaml"]
          pattern: 'metrics\.reporters:\s*grph,prometheus'
---

suite: metrics-service-disabled
templates:
  - templates/svc-metrics-coordinator.yaml
tests:
  - it: does not render coordinator metrics service when reporters are empty
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render coordinator metrics service when prometheus reporter is absent
    set:
      metrics.reporters: jmx
      metrics.jmx:
        port: 9250
    asserts:
      - hasDocuments:
          count: 0
---

suite: metrics-service-enabled
templates:
  - templates/svc-metrics-coordinator.yaml
tests:
  - it: renders coordinator metrics service with named metrics port
    set:
      metrics.reporters: prometheus
      metrics.prometheus:
        port: 9249
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-coordinator-server-metrics-hs
      - equal:
          path: spec.ports[0].name
          value: metrics
      - equal:
          path: spec.ports[0].port
          value: 9249
      - equal:
          path: spec.clusterIP
          value: None
  - it: renders custom port name and service labels for ServiceMonitor selectors
    set:
      metrics.reporters: prometheus
      metrics.prometheus.service.portName: fluss-metrics
      metrics.prometheus.service.labels:
        monitoring: enabled
    asserts:
      - equal:
          path: spec.ports[0].name
          value: fluss-metrics
      - equal:
          path: metadata.labels.monitoring
          value: enabled
  - it: renders value-driven annotations on metrics service when provided
    set:
      metrics.reporters: prometheus
      metrics.prometheus.service.annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "9249"
    asserts:
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: metadata.annotations["prometheus.io/path"]
          value: "/metrics"
      - equal:
          path: metadata.annotations["prometheus.io/port"]
          value: "9249"
  - it: renders no annotations when not configured
    set:
      metrics.reporters: prometheus
    asserts:
      - isNull:
          path: metadata.annotations
  - it: uses metrics component label
    set:
      metrics.reporters: prometheus
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/component"]
          value: metrics
---

suite: pod-service-separation
templates:
  - templates/svc-coordinator.yaml
  - templates/svc-tablet.yaml
tests:
  - it: keeps coordinator pod service without metrics annotations
    set:
      metrics.reporters: prometheus
      metrics.prometheus.service.annotations:
        prometheus.io/scrape: "true"
    template: templates/svc-coordinator.yaml
    asserts:
      - notExists:
          path: metadata.annotations
  - it: keeps tablet pod service without metrics annotations
    set:
      metrics.reporters: prometheus
      metrics.prometheus.service.annotations:
        prometheus.io/scrape: "true"
    template: templates/svc-tablet.yaml
    asserts:
      - notExists:
          path: metadata.annotations
---

suite: metrics-enabled-statefulset
templates:
  - templates/sts-coordinator.yaml
  - templates/sts-tablet.yaml
tests:
  - it: does not expose metrics container port for coordinator
    set:
      metrics.reporters: prometheus
    template: templates/sts-coordinator.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9249
  - it: does not expose metrics container port for tablet
    set:
      metrics.reporters: prometheus
    template: templates/sts-tablet.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9249
