# Default values for fluss.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  registry: ""
  repository: apache/fluss
  tag: "0.10.0-incubating"
  pullPolicy: IfNotPresent
  pullSecrets: []

coordinatorServer:
  replicas: 1

  livenessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

  readinessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

  resources: {}
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi

  persistence:
    enabled: false
    size: 1Gi
    storageClass:

tabletServer:
  replicas: 3

  livenessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

  readinessProbe:
    failureThreshold: 100
    timeoutSeconds: 1
    initialDelaySeconds: 10
    periodSeconds: 3

  resources: {}
  #   requests:
  #     cpu: 100m
  #     memory: 128Mi
  #   limits:
  #     cpu: 100m
  #     memory: 128Mi

  persistence:
    enabled: false
    size: 1Gi
    storageClass:

# Fluss server configuration options
configurationOverrides:
  # See detail https://fluss.apache.org/docs/maintenance/configuration/
  default.bucket.number: 3
  default.replication.factor: 3
  zookeeper.path.root: /fluss
  zookeeper.address: zk-zookeeper.{{ .Release.Namespace }}.svc.cluster.local:2181
  data.dir: /tmp/fluss/data
  internal.listener.name: INTERNAL
  # File systems configuration (see detail https://fluss.apache.org/docs/maintenance/filesystems/overview/)
  remote.data.dir: /tmp/fluss/remote-data

# Fluss listener configurations
ports:
  internal: 9123
  client: 9124

# Fluss security configurations
security:
  client:
    sasl:
      # "" | plain
      mechanism: ""
      plain:
        users: []

  internal:
    sasl:
      # "" | plain
      mechanism: ""
      plain:
        username: ""
        password: ""

serviceAccount:
  create: false
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Additional annotations to apply to the ServiceAccount.
  # These can be useful, for example, to support integrations like workload identity.
  annotations: {}
