apiVersion: v1
kind: ConfigMap
metadata:
  name: fluss-conf-file
  labels:
  {{- include "fluss.labels" . | nindent 4 }}
data:
  server.yaml: |
    {{- range $key, $val := .Values.configurationOverrides }}
    {{ $key }}: {{ tpl (printf "%v" $val) $ }}
    {{- end }}

    ### Security

    {{- $internalProtocol := include "fluss.security.listener.protocol" (dict "context" .Values "listener" "internal") | trim -}}
    {{- $clientProtocol := include "fluss.security.listener.protocol" (dict "context" .Values "listener" "client") | trim -}}
    {{- $enabledMechanisms := include "fluss.security.sasl.enabledMechanisms" . | trim -}}
    {{- $internalMechanism := include "fluss.security.listener.mechanism" (dict "context" .Values "listener" "internal") -}}
    {{- if (include "fluss.security.sasl.enabled" .) }}
    security.protocol.map: INTERNAL:{{ $internalProtocol }},CLIENT:{{ $clientProtocol }}
    security.sasl.enabled.mechanisms: {{ $enabledMechanisms }}
    {{- if ne $internalMechanism "" }}
    client.security.protocol: SASL
    client.security.sasl.mechanism: {{ upper $internalMechanism }}
    {{- end }}

    {{- end }}

    {{- if include "fluss.metrics.enabled" . }}
    ### Metrics

    metrics.reporters: {{ .Values.metrics.reporters }}
    {{- range $name := (include "fluss.metrics.reporterNames" . | fromYamlArray) }}
    {{ printf "metrics.reporter.%s.port" $name }}: {{ (index $.Values.metrics $name).port }}
    {{- end }}

    {{- end }}

  entrypoint.sh: |
    #!/bin/sh
    set -e

    COMPONENT="$1"

    FLUSS_SERVER_ID=${POD_NAME##*-}
    cp /opt/conf/server.yaml $FLUSS_HOME/conf

    BIND_LISTENERS="INTERNAL://${POD_IP}:{{ .Values.listeners.internal.port }}, CLIENT://${POD_IP}:{{ .Values.listeners.client.port }}"
    ADVERTISED_LISTENERS="CLIENT://${POD_NAME}.${COMPONENT}-server-hs.${POD_NAMESPACE}.svc.cluster.local:{{ .Values.listeners.client.port }}"

    echo "" >> $FLUSS_HOME/conf/server.yaml
    echo "bind.listeners: ${BIND_LISTENERS}" >> $FLUSS_HOME/conf/server.yaml
    echo "advertised.listeners: ${ADVERTISED_LISTENERS}" >> $FLUSS_HOME/conf/server.yaml

    if [ "$COMPONENT" = "tablet" ]; then
      echo "tablet-server.id: ${FLUSS_SERVER_ID}" >> $FLUSS_HOME/conf/server.yaml
    fi

    exec bin/${COMPONENT}-server.sh start-foreground
